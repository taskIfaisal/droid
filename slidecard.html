<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magic Card Trick</title>

<meta name="theme-color" content="#000000">
<meta name="description" content="Magic Card Trick">
<link rel="manifest" href="./manifest.json">

<link rel="apple-touch-icon" href="./icon/slide-512x512.png">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
html,body{
    margin:0;
    padding:0;
    width:100vw;
    height:100vh;
    background:black;
    overflow:hidden;
    touch-action:none;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

#background{
    position:fixed;
    inset:0;
    background-size:cover;
    background-position:center;
    z-index:1;
}

#card{
    position:absolute;
    width:100%;
    max-width:300px;
    z-index:2;
    user-select:none;
    -webkit-user-drag:none;
    touch-action:none;
    will-change:transform;
    opacity:0;
    visibility:hidden;
    transform-origin:center;
}

.card-visible{opacity:1;visibility:visible}
.card-moving{transition:transform .3s cubic-bezier(.25,.46,.45,.94),opacity .3s}
.card-flipping{animation:flipCard 1s cubic-bezier(.4,0,.2,1)}

@keyframes flipCard{
    0%{transform:rotateY(0)}
    50%{transform:rotateY(90deg)}
    100%{transform:rotateY(0)}
}

/* SETTINGS */
#settings{
    position:fixed;
    inset:0;
    top:-100%;
    background:rgba(0,0,0,.9);
    z-index:3;
    color:white;
    padding:20px;
    transition:.5s;
    overflow-y:auto;
}

.upload-preview{
    width:80px;height:80px;
    border:2px solid #666;
    background:#333;
    display:flex;
    align-items:center;
    justify-content:center;
}
.upload-preview img{max-width:100%;max-height:100%}

button{
    background:#4CAF50;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:5px;
}

/* === RESIZE OVERLAY (DITAMBAHKAN TANPA UBAH UI) === */
#cardResizeOverlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.9);
    z-index:9999;
    display:none;
}

#resizeCardWrapper{
    position:absolute;
    top:50%;left:50%;
    transform:translate(-50%,-50%);
}

#resizeCardPreview{
    width:240px;
    transform-origin:center;
}

#cardSizeSlider{
    position:fixed;
    bottom:80px;
    left:50%;
    transform:translateX(-50%);
    width:70%;
}

#saveCardSize{
    position:fixed;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    padding:10px 20px;
}
</style>
</head>

<body>

<div id="background"></div>
<img id="card" src="https://deckofcardsapi.com/static/img/AS.png">

<div id="settings">
    <h2>Magic Card Settings</h2>

    <h3>Card Images</h3>
    <div style="display:flex;gap:10px">
        <div>
            <button onclick="cardUpload1.click()">Card Image 1</button>
            <input id="card-upload-1" type="file" hidden>
            <div class="upload-preview" id="preview-1"></div>
        </div>
        <div>
            <button onclick="cardUpload2.click()">Card Image 2</button>
            <input id="card-upload-2" type="file" hidden>
            <div class="upload-preview" id="preview-2"></div>
        </div>
    </div>

    <button id="close-settings">Save & Close</button>
</div>

<!-- RESIZE OVERLAY -->
<div id="cardResizeOverlay">
    <div id="resizeCardWrapper">
        <img id="resizeCardPreview">
    </div>
    <input type="range" id="cardSizeSlider" min="0.7" max="1.6" step="0.01">
    <button id="saveCardSize">Save Size</button>
</div>

<script>
/* ===== SCALE SYSTEM ===== */
let cardScale = parseFloat(localStorage.getItem('magic_card_scale')) || 1;

/* ELEMENTS */
const card = document.getElementById('card');
const preview1 = document.getElementById('preview-1');
const preview2 = document.getElementById('preview-2');
const cardUpload1 = document.getElementById('card-upload-1');
const cardUpload2 = document.getElementById('card-upload-2');

/* POSITION */
let posX = 0, posY = 0;

/* APPLY TRANSFORM (AMAN) */
function updateCardTransform(){
    card.style.transform = `translate(${posX}px, ${posY}px) scale(${cardScale})`;
}

/* RESIZE OVERLAY */
const overlay = document.getElementById('cardResizeOverlay');
const resizeImg = document.getElementById('resizeCardPreview');
const slider = document.getElementById('cardSizeSlider');

preview1.addEventListener('click',()=>{
    overlay.style.display='block';
    resizeImg.src = preview1.querySelector('img')?.src;
    resizeImg.style.transform = `scale(${cardScale})`;
    slider.value = cardScale;
});

slider.addEventListener('input',e=>{
    cardScale = parseFloat(e.target.value);
    resizeImg.style.transform = `scale(${cardScale})`;
});

document.getElementById('saveCardSize').onclick=()=>{
    localStorage.setItem('magic_card_scale',cardScale);
    overlay.style.display='none';
    updateCardTransform();
};

/* PREVIEW UPDATE */
let cardImages={
    image1:"https://raw.githubusercontent.com/taskIfaisal/sw/main/icon/image1.png",
    image2:"https://raw.githubusercontent.com/taskIfaisal/sw/main/icon/image2.png"
};

function updatePreviews(){
    preview1.innerHTML=`<img src="${cardImages.image1}">`;
    preview2.innerHTML=`<img src="${cardImages.image2}">`;
}

updatePreviews();

/* DOUBLE TAP SHOW */
let tap=0;
document.addEventListener('touchstart',()=>{
    tap++;
    setTimeout(()=>tap=0,300);
    if(tap===2){
        card.style.display='block';
        card.style.opacity=1;
        posX=innerWidth/2-card.offsetWidth/2;
        posY=innerHeight/2-card.offsetHeight/2;
        updateCardTransform();
        tap=0;
    }
});
</script>

</body>
</html>
